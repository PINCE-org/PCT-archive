name: Build & deploy search site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "tables/**"
      - ".github/scripts/build_index.py"

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once, let the latest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build search index
        run: python .github/scripts/build_index.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
