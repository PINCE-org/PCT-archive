<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PINCE Cheat Table Archive</title>
  <style>
    :root {
      --bg: #ffffff; --fg: #1b1f24; --fg-soft: #3a4048; --muted: #5a6270; --card: #f6f8fa;
      --border: #d0d7de; --accent: #2563eb; --chip: #eaeef2;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117; --fg: #e6edf3; --fg-soft: #c9d1da; --muted: #8b949e; --card: #161b22;
        --border: #30363d; --accent: #4c8dff; --chip: #21262d;
      }
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--fg); }
    header { padding: 24px 20px 8px; max-width: 900px; margin: 0 auto; }
    h1 { margin: 0 0 4px; font-size: 1.5rem; }
    .sub { color: var(--muted); margin: 0 0 16px; }
    .controls { max-width: 900px; margin: 0 auto; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    input, select {
      background: var(--card); color: var(--fg); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px; font-size: 0.95rem;
    }
    #q { flex: 1 1 240px; }
    .btn {
      background: var(--accent); color: #fff; border: 0; border-radius: 8px;
      padding: 8px 14px; font-size: 0.95rem; text-decoration: none; white-space: nowrap;
    }
    main { max-width: 900px; margin: 16px auto 48px; padding: 0 20px; }
    .game { margin: 22px 0 8px; font-size: 1.05rem; color: var(--fg); border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; margin: 8px 0; display: flex; justify-content: space-between; gap: 12px; align-items: flex-start;
    }
    .title { font-weight: 600; color: var(--fg-soft); }
    .chips { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { background: var(--chip); color: var(--muted); border-radius: 999px; padding: 2px 9px; font-size: 0.78rem; }
    .meta-author { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }
    .empty { color: var(--muted); text-align: center; padding: 40px 0; }
    .actions { display: flex; gap: 14px; align-items: center; white-space: nowrap; }
    a.view { color: var(--muted); text-decoration: none; font-weight: 600; }
    a.dl { color: var(--accent); text-decoration: none; font-weight: 600; white-space: nowrap; }
    .info { flex: 1; min-width: 0; }
    .notes {
      margin-top: 8px; color: var(--muted); font-size: 0.82rem; line-height: 1.4;
      white-space: pre-wrap; overflow-wrap: anywhere;
      display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 3; overflow: hidden;
    }
    .notes.expanded { -webkit-line-clamp: unset; }
    .notes-toggle {
      display: block; margin-top: 4px; padding: 0; border: 0; background: none;
      color: var(--accent); font: inherit; font-size: 0.78rem; cursor: pointer;
    }
    .notes-toggle[hidden] { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>PINCE Cheat Table Archive</h1>
    <p class="sub">Search and download community <code>.pct</code> cheat tables.</p>
  </header>

  <div class="controls">
    <input id="q" type="search" placeholder="Search game or table title…" autocomplete="off" />
    <select id="distributor"><option value="">Any distributor</option></select>
    <select id="runtime"><option value="">Any runtime</option></select>
    <a class="btn" href="https://github.com/PINCE-org/PCT-archive/blob/main/CONTRIBUTING.md">Submit a table</a>
  </div>

  <main id="results"><p class="empty">Loading…</p></main>

  <script>
    // Where the raw .pct files live. Update if the repo owner/branch changes.
    const RAW_BASE = "https://raw.githubusercontent.com/PINCE-org/PCT-archive/main/";

    const els = {
      q: document.getElementById("q"),
      distributor: document.getElementById("distributor"),
      runtime: document.getElementById("runtime"),
      results: document.getElementById("results"),
    };
    let tables = [];

    function fillFacet(select, values) {
      [...new Set(values.filter(Boolean))].sort().forEach((v) => {
        const opt = document.createElement("option");
        opt.value = v.toLowerCase();
        opt.textContent = v;
        select.appendChild(opt);
      });
    }

    function render() {
      const q = els.q.value.trim().toLowerCase();
      const dist = els.distributor.value;
      const rt = els.runtime.value;

      const filtered = tables.filter((t) => {
        if (dist && (t.distributor || "").toLowerCase() !== dist) return false;
        if (rt && (t.runtime || "").toLowerCase() !== rt) return false;
        if (q && !(`${t.game} ${t.title} ${t.notes || ""}`.toLowerCase().includes(q))) return false;
        return true;
      });

      if (!filtered.length) {
        els.results.innerHTML = '<p class="empty">No tables match your search.</p>';
        return;
      }

      const byGame = {};
      filtered.forEach((t) => (byGame[t.game] ||= []).push(t));

      els.results.innerHTML = Object.keys(byGame).sort().map((game) => {
        const cards = byGame[game].map((t) => {
          const chips = [t.distributor, t.version, t.runtime]
            .filter(Boolean).map((c) => `<span class="chip">${esc(c)}</span>`).join("");
          const author = t.author ? `<div class="meta-author">by ${esc(t.author)}</div>` : "";
          const href = RAW_BASE + t.pct_path.split("/").map(encodeURIComponent).join("/");
          const fname = t.pct_path.split("/").pop();
          const notes = t.notes ? `<div class="notes">${esc(t.notes)}</div><button class="notes-toggle" type="button" hidden></button>` : "";
          return `<div class="card"><div class="info">
              <div class="title">${esc(t.title)}</div>
              <div class="chips">${chips}</div>${author}${notes}
            </div><div class="actions">`
            + `<a class="view" href="${href}" target="_blank" rel="noopener">View</a>`
            + `<a class="dl" href="${href}" download="${esc(fname)}" data-name="${esc(fname)}">Download</a>`
            + `</div></div>`;
        }).join("");
        return `<h2 class="game">${esc(game)}</h2>${cards}`;
      }).join("");
      markClamped();
    }

    // Reveal the expand/collapse toggle only on notes that actually overflow the clamp,
    // so short notes that already fit get no arrow.
    function markClamped() {
      els.results.querySelectorAll(".notes").forEach((n) => {
        if (n.classList.contains("expanded")) return;
        const toggle = n.nextElementSibling;
        const overflowing = n.scrollHeight > n.clientHeight + 1;
        if (toggle && toggle.classList.contains("notes-toggle")) {
          toggle.hidden = !overflowing;
          toggle.textContent = "Show more ▾";
        }
      });
    }
    window.addEventListener("resize", markClamped);

    function esc(s) {
      return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    fetch("./index.json")
      .then((r) => r.json())
      .then((data) => {
        tables = data.tables || [];
        fillFacet(els.distributor, tables.map((t) => t.distributor));
        fillFacet(els.runtime, tables.map((t) => t.runtime));
        render();
      })
      .catch(() => (els.results.innerHTML = '<p class="empty">Could not load the table index yet.</p>'));

    ["input", "change"].forEach((ev) => {
      els.q.addEventListener(ev, render);
      els.distributor.addEventListener(ev, render);
      els.runtime.addEventListener(ev, render);
    });

    // Expand or collapse a note only when its Show more/less toggle is clicked.
    els.results.addEventListener("click", (e) => {
      const toggle = e.target.closest(".notes-toggle");
      if (!toggle) return;
      const note = toggle.previousElementSibling;
      if (note && note.classList.contains("notes")) {
        const expanded = note.classList.toggle("expanded");
        toggle.textContent = expanded ? "Show less ▴" : "Show more ▾";
      }
    });

    // A cross-origin link ignores the `download` attribute, and raw files are served
    // as text/plain, so a plain click just shows the text. Raw allows CORS, so we fetch
    // the file and save it. Where the File System Access API exists (Chromium) we prompt
    // a Save As dialog so the user picks the folder, otherwise we fall back to a blob
    // download, which respects the browser's own "ask where to save" setting.
    async function saveBlobFallback(url, name) {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const objUrl = URL.createObjectURL(await resp.blob());
      const a = document.createElement("a");
      a.href = objUrl;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(objUrl);
    }

    els.results.addEventListener("click", async (e) => {
      const link = e.target.closest("a.dl");
      if (!link) return;
      e.preventDefault();
      const url = link.href;
      const name = link.dataset.name || "table.pct";

      // Chromium: prompt a native Save As dialog so the user can choose the folder.
      if (window.showSaveFilePicker) {
        let handle;
        try {
          handle = await window.showSaveFilePicker({
            suggestedName: name,
            types: [{ description: "PINCE cheat table", accept: { "application/octet-stream": [".pct"] } }],
          });
        } catch (err) {
          if (err.name === "AbortError") return;  // user cancelled the dialog
          handle = null;  // picker unavailable, fall through to the blob download
        }
        if (handle) {
          try {
            const resp = await fetch(url);
            if (!resp.ok) throw new Error("HTTP " + resp.status);
            const writable = await handle.createWritable();
            await writable.write(await resp.blob());
            await writable.close();
            return;
          } catch (err) {
            window.open(url, "_blank");
            return;
          }
        }
      }

      // Firefox/Safari, or picker blocked: download to the browser's default location.
      try {
        await saveBlobFallback(url, name);
      } catch (err) {
        window.open(url, "_blank");  // last resort: open the raw file so it can be saved manually
      }
    });
  </script>
</body>
</html>
